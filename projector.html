<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MANDALA MACHINE - Projector Output</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #projCanvas { display: block; width: 100vw; height: 100vh; object-fit: contain; }
    #statusOverlay {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.2);
      font-family: monospace; font-size: 14px;
      letter-spacing: 0.2em; text-align: center; pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="projCanvas"></canvas>
  <div id="statusOverlay">WAITING FOR SIGNAL...</div>
  <script>
    const { ipcRenderer } = require('electron');
    const canvas = document.getElementById('projCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('statusOverlay');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    ipcRenderer.on('canvas-frame', (event, dataURL) => {
      overlay.style.display = 'none';
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
        const x = (canvas.width - img.width * scale) / 2;
        const y = (canvas.height - img.height * scale) / 2;
        ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
      };
      img.src = dataURL;
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') ipcRenderer.send('projector-fullscreen', false);
      if (e.key === 'f' || e.key === 'F') ipcRenderer.send('projector-fullscreen', true);
    });
  </script>
</body>
</html>
